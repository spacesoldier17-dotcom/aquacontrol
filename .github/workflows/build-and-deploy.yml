name: Two-stage CI/CD

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────────────
  # JOB 1: CI – компиляция бинарника в изолированном контейнере
  # ──────────────────────────────────────────────────────────
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout исходники микросервиса
        uses: actions/checkout@v4
        with:
          repository: your-org/microservice-repo
          token: ${{ secrets.GH_PAT }}
      
      - name: Компиляция в Golang-контейнере (пример)
        uses: docker://golang:1.21
        with:
          args: go build -o aqua-service ./cmd/service
      
      - name: Загрузить бинарник как артефакт
        uses: actions/upload-artifact@v4
        with:
          name: aqua-binary
          path: aqua-service

  # ──────────────────────────────────────────────────────────
  # JOB 2: CD – сборка образа с бинарником + конфиги из другого репозитория
  # ──────────────────────────────────────────────────────────
  package:
    needs: compile
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout репозиторий с Dockerfile и конфигами
        uses: actions/checkout@v4
        with:
          repository: your-org/aquacontrol-deploy
          token: ${{ secrets.GH_PAT }}
      
      - name: Скачать бинарник из CI
        uses: actions/download-artifact@v4
        with:
          name: aqua-binary
          path: ./bin
      
      - name: Сборка Docker-образа
        run: |
          docker build -t ghcr.io/your-org/aquacontrol:latest -f Dockerfile .
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ghcr.io/your-org/aquacontrol:latest
      
      # опционально: деплой на сервер
      - name: Деплой через SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          script: |
            cd /opt/aquacontrol
            docker-compose pull && docker-compose up -d
